<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kvíz – Konstrukce vozidel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --purple: #534AB7;
    --purple-dark: #3C3489;
    --green: #1D9E75;
    --green-light: #EAF3DE;
    --green-dark: #3B6D11;
    --red: #E24B4A;
    --red-light: #FCEBEB;
    --red-dark: #A32D2D;
    --a: #534AB7;
    --b: #0F6E56;
    --c: #993C1D;
    --d: #185FA5;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: #1a1a2e;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    color: #fff;
  }

  .container {
    width: 100%;
    max-width: 760px;
  }

  /* START */
  #start-screen {
    text-align: center;
    padding: 3rem 2rem;
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
  }
  .logo { font-size: 48px; margin-bottom: 1rem; }
  #start-screen h1 { font-size: 32px; font-weight: 900; margin-bottom: 0.5rem; letter-spacing: -0.5px; }
  #start-screen .sub { font-size: 16px; color: rgba(255,255,255,0.6); margin-bottom: 2.5rem; }
  .pill { display: inline-block; background: rgba(255,255,255,0.1); border-radius: 20px; padding: 6px 16px; font-size: 13px; margin: 0 4px 1rem; color: rgba(255,255,255,0.8); }

  .start-btn {
    display: inline-block;
    padding: 1rem 3rem;
    background: var(--purple);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    font-weight: 800;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
    box-shadow: 0 4px 20px rgba(83,74,183,0.5);
  }
  .start-btn:hover { background: var(--purple-dark); transform: translateY(-2px); }
  .start-btn:active { transform: scale(0.97); }

  /* QUIZ */
  #quiz-screen { display: none; }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .q-num { font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.6); }

  .timer-wrap { position: relative; width: 52px; height: 52px; }
  .timer-svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
  .timer-track { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 4; }
  .timer-fill { fill: none; stroke: #fff; stroke-width: 4; stroke-linecap: round;
    stroke-dasharray: 125.6; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear, stroke 0.3s; }
  .timer-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 17px; font-weight: 900; }

  .progress-bar { height: 5px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 1.25rem; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--purple); border-radius: 3px; transition: width 0.4s; }

  .question-card {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 1.5rem 1.75rem;
    margin-bottom: 1.25rem;
    min-height: 90px;
    display: flex;
    align-items: center;
  }
  .question-text { font-size: 20px; font-weight: 700; line-height: 1.4; text-align: center; width: 100%; }

  .answers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1rem;
  }

  .answer-btn {
    border: none;
    border-radius: 12px;
    padding: 1rem 1.1rem;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    transition: transform 0.1s, filter 0.15s;
    color: #fff;
    line-height: 1.35;
  }
  .answer-btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }
  .answer-btn:active:not(:disabled) { transform: scale(0.97); }
  .answer-btn:disabled { cursor: default; }

  .answer-btn[data-idx="0"] { background: var(--a); }
  .answer-btn[data-idx="1"] { background: var(--b); }
  .answer-btn[data-idx="2"] { background: var(--c); }
  .answer-btn[data-idx="3"] { background: var(--d); }

  .answer-btn.correct { background: var(--green) !important; box-shadow: 0 0 0 3px #fff; }
  .answer-btn.wrong { background: var(--red) !important; opacity: 0.7; }
  .answer-btn.reveal { background: var(--green) !important; box-shadow: 0 0 0 3px rgba(255,255,255,0.5); }
  .answer-btn.dim { opacity: 0.4; }

  .shape-icon { width: 26px; height: 26px; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; background: rgba(0,0,0,0.25); margin-top: 1px; }

  .feedback {
    padding: 0.85rem 1.25rem;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 0.75rem;
    display: none;
  }
  .feedback.correct { background: rgba(29,158,117,0.25); border: 1px solid var(--green); color: #7df0c6; }
  .feedback.wrong { background: rgba(226,75,74,0.2); border: 1px solid var(--red); color: #ffaaaa; }

  .next-btn {
    width: 100%;
    padding: 0.85rem;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    display: none;
    transition: background 0.15s;
  }
  .next-btn:hover { background: rgba(255,255,255,0.18); }

  /* RESULTS */
  #result-screen {
    display: none;
    text-align: center;
    padding: 2.5rem 2rem;
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .result-emoji { font-size: 52px; margin-bottom: 0.5rem; }
  #result-screen h2 { font-size: 26px; font-weight: 900; margin-bottom: 0.5rem; }
  .score-pct { font-size: 72px; font-weight: 900; color: var(--purple); line-height: 1; margin: 0.5rem 0; }
  .score-pct span { font-size: 36px; }
  .score-msg { font-size: 16px; color: rgba(255,255,255,0.65); margin-bottom: 2rem; }

  .stats-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 2rem; }
  .stat-card { background: rgba(255,255,255,0.07); border-radius: 12px; padding: 1rem; }
  .stat-val { font-size: 28px; font-weight: 900; }
  .stat-label { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 2px; }
  .stat-card.good .stat-val { color: #7df0c6; }
  .stat-card.bad .stat-val { color: #ffaaaa; }

  .restart-btn {
    padding: 0.9rem 2.5rem;
    background: var(--purple);
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-size: 17px;
    font-weight: 800;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    box-shadow: 0 4px 20px rgba(83,74,183,0.4);
  }
  .restart-btn:hover { background: var(--purple-dark); transform: translateY(-2px); }

  @media (max-width: 500px) {
    .answers-grid { grid-template-columns: 1fr; }
    .question-text { font-size: 17px; }
    .score-pct { font-size: 56px; }
  }
</style>
</head>
<body>
<div class="container">

  <div id="start-screen">
    <div class="logo">🚗</div>
    <h1>Konstrukce vozidel</h1>
    <p class="sub">Kvíz pro 2. ročník · obor karosář</p>
    <div>
      <span class="pill">📋 28 otázek</span>
      <span class="pill">⏱ 20 sekund / otázka</span>
    </div>
    <button class="start-btn" onclick="startQuiz()">Spustit kvíz</button>
  </div>

  <div id="quiz-screen">
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div class="top-bar">
      <span class="q-num" id="q-counter">1 / 28</span>
      <div class="timer-wrap">
        <svg class="timer-svg" width="52" height="52" viewBox="0 0 52 52">
          <circle class="timer-track" cx="26" cy="26" r="20"/>
          <circle class="timer-fill" id="timer-ring" cx="26" cy="26" r="20"/>
        </svg>
        <div class="timer-num" id="timer-num">20</div>
      </div>
    </div>
    <div class="question-card"><p class="question-text" id="q-text"></p></div>
    <div class="answers-grid" id="answers"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Další otázka →</button>
  </div>

  <div id="result-screen">
    <div class="result-emoji" id="result-emoji">🏆</div>
    <h2>Výsledek kvízu</h2>
    <div class="score-pct" id="score-pct">0<span>%</span></div>
    <p class="score-msg" id="score-msg"></p>
    <div class="stats-grid">
      <div class="stat-card good"><div class="stat-val" id="rb-correct">0</div><div class="stat-label">Správně</div></div>
      <div class="stat-card bad"><div class="stat-val" id="rb-wrong">0</div><div class="stat-label">Špatně</div></div>
      <div class="stat-card"><div class="stat-val" id="rb-total">28</div><div class="stat-label">Celkem</div></div>
    </div>
    <button class="restart-btn" onclick="restartQuiz()">🔄 Zkusit znovu</button>
  </div>

</div>

<script>
const questions = [
  { q: "Do které kategorie patří motorová vozidla zpravidla s méně než čtyřmi koly?", answers: ["Kategorie L", "Kategorie M", "Kategorie N", "Kategorie O"], correct: 0 },
  { q: "Kategorie M zahrnuje motorová vozidla, která mají nejméně čtyři kola a slouží k:", answers: ["Dopravě nákladů", "Dopravě osob", "Zemědělské práci", "Přívěsným účelům"], correct: 1 },
  { q: "Kategorie N jsou motorová vozidla, která mají nejméně čtyři kola a slouží k:", answers: ["Dopravě osob", "Terénní jízdě", "Dopravě nákladů", "Rekreačním účelům"], correct: 2 },
  { q: "Jak se označuje kategorie traktorů zemědělských nebo lesnických?", answers: ["Kategorie R", "Kategorie S", "Kategorie T", "Kategorie O"], correct: 2 },
  { q: "Co je to 'nástavba' vozidla?", answers: ["Střecha karoserie", "Funkční účelová část speciálního vozidla bez budky pro obsluhu", "Zavazadlový prostor", "Podvozek nákladního auta"], correct: 1 },
  { q: "Co je 'náprava' vozidla?", answers: ["Část pohonu mezi motorem a koly", "Část, jíž jsou dvě protější kola zavěšena na nosné konstrukci vozidla", "Systém řízení kol", "Brzdový mechanismus"], correct: 1 },
  { q: "Co je 'pérování' vozidla?", answers: ["Systém řízení vozidla", "Brzdová soustava", "Zařízení k pružnému zachycování nárazů vznikajících při jízdě vlivem nerovností vozovky", "Pohonná soustava"], correct: 2 },
  { q: "Co je 'řízení' vozidla?", answers: ["Soustava přenosu výkonu motoru", "Brzdný systém", "Ústrojí, kterým řidič udržuje nebo mění směr jízdy vozidla", "Systém odpružení"], correct: 2 },
  { q: "Co je 'brzdné zařízení'?", answers: ["Soustava pro přenos hnacího momentu", "Soubor brzdových soustav a zpomalovacích soustav, jimiž je vozidlo opatřeno", "Systém odpružení kol", "Část podvozku"], correct: 1 },
  { q: "Co patří do 'příslušenství' vozidla?", answers: ["Náhradní díly a nářadí", "Pomocná zařízení nezbytná pro činnost vozidla jako zapalování, chlazení, osvětlení", "Sněhové řetězy a lékárnička", "Stěrače a zrcátka"], correct: 1 },
  { q: "Jaký je rozdíl mezi 'výstrojem' a 'výbavou' vozidla?", answers: ["Výstroj je nezbytný, výbava nikoliv", "Výstroj jsou předepsané nebo účelné prvky (zrcátka, stěrače), výbava jsou nespojené pomůcky (hasicí přístroj, nářadí)", "Jsou to synonyma", "Výbava je spojená s vozidlem, výstroj nikoliv"], correct: 1 },
  { q: "Jako 'výbava' vozidla se označuje:", answers: ["Zapalování a osvětlení", "Stěrače a rychloměr", "Nářadí, plachta, hasící přístroj, sněhové řetězy a náhradní díly", "Motor a převodovka"], correct: 2 },
  { q: "Co rozumíme pod pojmem 'základní koncepce automobilu'?", answers: ["Typ karoserie", "Umístění hnacího ústrojí (motoru, spojky, převodovky a rozvodovky) vůči nápravám", "Barva a výbava vozu", "Typ pohonu – benzín nebo diesel"], correct: 1 },
  { q: "Které koncepce pohonu rozlišujeme?", answers: ["Přední, zadní, boční a střední", "Klasická, přední pohon, zadní pohon, pohon všech kol", "Pohon 2x2 a 4x4", "Benzínový, dieselový, elektrický"], correct: 1 },
  { q: "Jak je uspořádán motor v klasické koncepci?", answers: ["Motor vpředu, pohon předních kol", "Motor vzadu, pohon zadních kol", "Motor vpředu podélně, pohon zadních kol přes kloubový hřídel", "Motor uprostřed, pohon všech kol"], correct: 2 },
  { q: "Co je pohon Transaxle?", answers: ["Motor vzadu a pohon předních kol", "Motor vpředu, převodovka s rozvodovkou na zadní poháněné nápravě", "Motor uprostřed s pohonem všech kol", "Motor příčně vzadu"], correct: 1 },
  { q: "Jaká je výhoda klasické koncepce?", answers: ["Žádný spojovací hřídel", "Kompaktní pohonná soustava vpředu", "Poměrně velký zavazadlový prostor a možnost různých verzí karoserie", "Jednoduchá přední náprava"], correct: 2 },
  { q: "Jaká je nevýhoda klasické koncepce?", answers: ["Malý zavazadlový prostor", "Nutnost spojovacího kloubového hřídele jako zdroje vibrací a hluku", "Složitá zadní náprava", "Přetáčivost vozidla"], correct: 1 },
  { q: "Vozidlo s předním pohonem se při pohonu předních kol chová jako:", answers: ["Přetáčivé", "Nedotáčivé (tahané vpřed, stabilní stav)", "Labilní", "Neutrálně stabilní"], correct: 1 },
  { q: "Jak může být motor uspořádán u vozu s předním pohonem?", answers: ["Pouze příčně", "Pouze podélně", "Podélně (např. Audi) nebo příčně (např. Škoda Octavia)", "Pouze vzadu"], correct: 2 },
  { q: "Která výhoda předního pohonu se týká podlahy karoserie?", answers: ["Vyšší poloha podlahy", "Hladká podlaha karoserie (odpadá tunel)", "Kratší výfukové potrubí", "Pevnější podlaha"], correct: 1 },
  { q: "Jaká je nevýhoda předního pohonu při jízdě do svahu a akceleraci?", answers: ["Sklon k přetáčivosti", "Nestejné opotřebení pneumatik na přední nápravě", "Odlehčení přední hnací nápravy", "Složité brzdění"], correct: 2 },
  { q: "U zadního pohonu, kdy motor stojí PŘED zadní nápravou, se vozidlo označuje jako:", answers: ["Provedení s motorem vzadu", "Provedení s motorem uprostřed", "Provedení s motorem příčně", "Transaxle"], correct: 1 },
  { q: "Vozidlo se zadním pohonem a motorem před zadní nápravou nemůže mít zadní sedadla, proto se hodí pouze jako:", answers: ["Rodinné auto", "Sportovní nebo závodní vozidlo (dvě místa)", "Terénní vozidlo", "Nákladní vozidlo"], correct: 1 },
  { q: "Jaká je nevýhoda zadního pohonu s motorem vzadu?", answers: ["Žádný tunel v podlaze", "Sklon k přetáčivosti a citlivost na boční vítr", "Nedotáčivost", "Hladká podlaha karoserie"], correct: 1 },
  { q: "Pohon všech kol se zpočátku používal především u:", answers: ["Sportovních vozů", "Osobních automobilů vyšší třídy", "Terénních vozidel", "Nákladních vozidel"], correct: 2 },
  { q: "V roce 1980 představila firma Audi pro osobní automobily pohon všech kol pod názvem:", answers: ["Syncro", "xDrive", "Quattro", "4Matic"], correct: 2 },
  { q: "Co je nutné při pohonu všech kol kvůli vyrovnání rozdílů otáček předních a zadních kol?", answers: ["Dvojitá spojka", "Mezinápravový diferenciál", "ABS systém", "Aktivní odpružení"], correct: 1 },
];

const SHAPES = ['▲', '■', '●', '✦'];
const TOTAL_TIME = 20;
const CIRCUMFERENCE = 2 * Math.PI * 20;

let current = 0, score = 0, wrong = 0, timeLeft = TOTAL_TIME;
let timerInterval = null, answered = false;

function startQuiz() {
  current = 0; score = 0; wrong = 0;
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  answered = false;
  timeLeft = TOTAL_TIME;
  const q = questions[current];

  document.getElementById('q-counter').textContent = `${current + 1} / ${questions.length}`;
  document.getElementById('progress').style.width = `${(current / questions.length) * 100}%`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';

  const ring = document.getElementById('timer-ring');
  const numEl = document.getElementById('timer-num');
  ring.style.stroke = '#fff';
  ring.style.strokeDashoffset = 0;
  numEl.textContent = TOTAL_TIME;

  const answers = document.getElementById('answers');
  answers.innerHTML = '';
  q.answers.forEach((a, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.setAttribute('data-idx', i);
    btn.innerHTML = `<span class="shape-icon">${SHAPES[i]}</span><span>${a}</span>`;
    btn.onclick = () => selectAnswer(i);
    answers.appendChild(btn);
  });

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    numEl.textContent = timeLeft;
    const offset = CIRCUMFERENCE * (1 - timeLeft / TOTAL_TIME);
    ring.style.strokeDashoffset = offset;
    if (timeLeft <= 5) ring.style.stroke = '#ff6b6b';
    if (timeLeft <= 0) { clearInterval(timerInterval); if (!answered) timeUp(); }
  }, 1000);
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);
  const q = questions[current];
  const btns = document.querySelectorAll('.answer-btn');
  btns.forEach(b => { b.disabled = true; b.classList.add('dim'); });

  const fb = document.getElementById('feedback');
  if (idx === q.correct) {
    score++;
    btns[idx].classList.remove('dim');
    btns[idx].classList.add('correct');
    fb.className = 'feedback correct';
    fb.textContent = '✓ Správně!';
  } else {
    wrong++;
    btns[idx].classList.remove('dim');
    btns[idx].classList.add('wrong');
    btns[q.correct].classList.remove('dim');
    btns[q.correct].classList.add('reveal');
    fb.className = 'feedback wrong';
    fb.textContent = `✗ Špatně. Správná odpověď: ${q.answers[q.correct]}`;
  }
  fb.style.display = 'block';
  document.getElementById('next-btn').style.display = 'block';
}

function timeUp() {
  answered = true;
  wrong++;
  const q = questions[current];
  const btns = document.querySelectorAll('.answer-btn');
  btns.forEach(b => { b.disabled = true; b.classList.add('dim'); });
  btns[q.correct].classList.remove('dim');
  btns[q.correct].classList.add('reveal');
  const fb = document.getElementById('feedback');
  fb.className = 'feedback wrong';
  fb.textContent = `⏱ Čas vypršel! Správná odpověď: ${q.answers[q.correct]}`;
  fb.style.display = 'block';
  document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
  current++;
  if (current >= questions.length) showResults();
  else showQuestion();
}

function showResults() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  const pct = Math.round((score / questions.length) * 100);
  document.getElementById('score-pct').innerHTML = `${pct}<span>%</span>`;
  document.getElementById('rb-correct').textContent = score;
  document.getElementById('rb-wrong').textContent = wrong;
  document.getElementById('rb-total').textContent = questions.length;

  let emoji = '😔', msg = 'Bude potřeba více procvičit. Projdi si znovu slidy.';
  if (pct >= 90) { emoji = '🏆'; msg = 'Výborně! Perfektní znalost učiva!'; }
  else if (pct >= 75) { emoji = '🎉'; msg = 'Skvělé výsledky! Jen pár věcí k doladění.'; }
  else if (pct >= 55) { emoji = '👍'; msg = 'Ujde to. Doporučujeme projít slidy znovu.'; }
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('score-msg').textContent = msg;
}

function restartQuiz() {
  current = 0; score = 0; wrong = 0;
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  showQuestion();
}
</script>
