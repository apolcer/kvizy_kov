<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kvíz – Konstrukce vozidel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --purple:#534AB7; --purple-dark:#3C3489; --green:#1D9E75; --red:#E24B4A; --a:#534AB7; --b:#0F6E56; --c:#993C1D; --d:#185FA5; }
  body { font-family:'Nunito',sans-serif; background:#1a1a2e; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1rem; color:#fff; }
  .container { width:100%; max-width:760px; }
  #start-screen { text-align:center; padding:3rem 2rem; background:rgba(255,255,255,0.05); border-radius:20px; border:1px solid rgba(255,255,255,0.1); }
  .logo { font-size:48px; margin-bottom:1rem; }
  #start-screen h1 { font-size:30px; font-weight:900; margin-bottom:0.5rem; }
  #start-screen .sub { font-size:15px; color:rgba(255,255,255,0.6); margin-bottom:0.75rem; }
  .pill { display:inline-block; background:rgba(255,255,255,0.1); border-radius:20px; padding:5px 14px; font-size:13px; margin:0 3px 1rem; color:rgba(255,255,255,0.8); }
  .bank-info { font-size:13px; color:rgba(255,255,255,0.45); margin-bottom:2rem; }
  .start-btn { display:inline-block; padding:1rem 3rem; background:var(--purple); color:#fff; font-family:'Nunito',sans-serif; font-size:18px; font-weight:800; border:none; border-radius:50px; cursor:pointer; transition:transform 0.15s,background 0.15s; box-shadow:0 4px 20px rgba(83,74,183,0.5); }
  .start-btn:hover { background:var(--purple-dark); transform:translateY(-2px); }
  #quiz-screen { display:none; }
  .top-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; }
  .q-num { font-size:14px; font-weight:700; color:rgba(255,255,255,0.6); }
  .timer-wrap { position:relative; width:52px; height:52px; }
  .timer-svg { position:absolute; top:0; left:0; transform:rotate(-90deg); }
  .timer-track { fill:none; stroke:rgba(255,255,255,0.1); stroke-width:4; }
  .timer-fill { fill:none; stroke:#fff; stroke-width:4; stroke-linecap:round; stroke-dasharray:125.6; stroke-dashoffset:0; transition:stroke-dashoffset 1s linear,stroke 0.3s; }
  .timer-num { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:900; }
  .progress-bar { height:5px; background:rgba(255,255,255,0.1); border-radius:3px; margin-bottom:1.25rem; overflow:hidden; }
  .progress-fill { height:100%; background:var(--purple); border-radius:3px; transition:width 0.4s; }
  .question-card { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12); border-radius:16px; padding:1.5rem 1.75rem; margin-bottom:1.25rem; min-height:90px; display:flex; align-items:center; }
  .question-text { font-size:19px; font-weight:700; line-height:1.4; text-align:center; width:100%; }
  .answers-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:1rem; }
  .answer-btn { border:none; border-radius:12px; padding:1rem 1.1rem; font-family:'Nunito',sans-serif; font-size:14px; font-weight:700; cursor:pointer; text-align:left; display:flex; align-items:flex-start; gap:10px; transition:transform 0.1s,filter 0.15s; color:#fff; line-height:1.35; }
  .answer-btn:hover:not(:disabled) { transform:translateY(-2px); filter:brightness(1.1); }
  .answer-btn:disabled { cursor:default; }
  .answer-btn[data-idx="0"] { background:var(--a); }
  .answer-btn[data-idx="1"] { background:var(--b); }
  .answer-btn[data-idx="2"] { background:var(--c); }
  .answer-btn[data-idx="3"] { background:var(--d); }
  .answer-btn.correct { background:var(--green)!important; box-shadow:0 0 0 3px #fff; }
  .answer-btn.wrong { background:var(--red)!important; opacity:0.7; }
  .answer-btn.reveal { background:var(--green)!important; box-shadow:0 0 0 3px rgba(255,255,255,0.5); }
  .answer-btn.dim { opacity:0.4; }
  .shape-icon { width:26px; height:26px; border-radius:6px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:13px; background:rgba(0,0,0,0.25); margin-top:1px; }
  .feedback { padding:0.85rem 1.25rem; border-radius:12px; font-size:15px; font-weight:700; margin-bottom:0.75rem; display:none; }
  .feedback.correct { background:rgba(29,158,117,0.25); border:1px solid var(--green); color:#7df0c6; }
  .feedback.wrong { background:rgba(226,75,74,0.2); border:1px solid var(--red); color:#ffaaaa; }
  .next-btn { width:100%; padding:0.85rem; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:12px; color:#fff; font-family:'Nunito',sans-serif; font-size:16px; font-weight:800; cursor:pointer; display:none; transition:background 0.15s; }
  .next-btn:hover { background:rgba(255,255,255,0.18); }
  #result-screen { display:none; text-align:center; padding:2.5rem 2rem; background:rgba(255,255,255,0.05); border-radius:20px; border:1px solid rgba(255,255,255,0.1); }
  .result-emoji { font-size:52px; margin-bottom:0.5rem; }
  #result-screen h2 { font-size:26px; font-weight:900; margin-bottom:0.5rem; }
  .score-pct { font-size:72px; font-weight:900; color:var(--purple); line-height:1; margin:0.5rem 0; }
  .score-pct span { font-size:36px; }
  .score-msg { font-size:16px; color:rgba(255,255,255,0.65); margin-bottom:2rem; }
  .stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:1.5rem; }
  .stat-card { background:rgba(255,255,255,0.07); border-radius:12px; padding:1rem; }
  .stat-val { font-size:28px; font-weight:900; }
  .stat-label { font-size:12px; color:rgba(255,255,255,0.55); margin-top:2px; }
  .stat-card.good .stat-val { color:#7df0c6; }
  .stat-card.bad .stat-val { color:#ffaaaa; }
  .variant-badge { font-size:12px; color:rgba(255,255,255,0.4); margin-bottom:1.5rem; }
  .btn-row { display:flex; gap:10px; justify-content:center; }
  .restart-btn { padding:0.9rem 2rem; background:var(--purple); color:#fff; font-family:'Nunito',sans-serif; font-size:16px; font-weight:800; border:none; border-radius:50px; cursor:pointer; transition:background 0.15s,transform 0.1s; box-shadow:0 4px 20px rgba(83,74,183,0.4); }
  .restart-btn:hover { background:var(--purple-dark); transform:translateY(-2px); }
  .new-btn { padding:0.9rem 2rem; background:rgba(255,255,255,0.1); color:#fff; font-family:'Nunito',sans-serif; font-size:16px; font-weight:800; border:1px solid rgba(255,255,255,0.2); border-radius:50px; cursor:pointer; transition:background 0.15s; }
  .new-btn:hover { background:rgba(255,255,255,0.18); }
  .img-question { display:flex; flex-direction:column; align-items:center; gap:0.75rem; width:100%; }
  .img-question svg { max-width:100%; border-radius:10px; }
  .img-question .q-label { font-size:17px; font-weight:700; text-align:center; line-height:1.4; }
  @media(max-width:500px){ .answers-grid{grid-template-columns:1fr;} .question-text{font-size:16px;} .score-pct{font-size:56px;} .btn-row{flex-direction:column;} }
</style>
</head>
<body>
<div class="container">
  <div id="start-screen">
    <div class="logo">🚗</div>
    <h1>Konstrukce vozidel</h1>
    <p class="sub">Kvíz pro 2. ročník · obor karosář</p>
    <div>
      <span class="pill">📋 20 otázek / varianta</span>
      <span class="pill">⏱ 60 sekund / otázka</span>
      <span class="pill">🔀 náhodný výběr</span>
    </div>
    <p class="bank-info" id="bank-count"></p>
    <button class="start-btn" onclick="startQuiz()">Spustit kvíz</button>
  </div>

  <div id="quiz-screen">
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    <div class="top-bar">
      <span class="q-num" id="q-counter">1 / 20</span>
      <div class="timer-wrap">
        <svg class="timer-svg" width="52" height="52" viewBox="0 0 52 52">
          <circle class="timer-track" cx="26" cy="26" r="20"/>
          <circle class="timer-fill" id="timer-ring" cx="26" cy="26" r="20"/>
        </svg>
        <div class="timer-num" id="timer-num">60</div>
      </div>
    </div>
    <div class="question-card"><p class="question-text" id="q-text"></p></div>
    <div class="answers-grid" id="answers"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Další otázka →</button>
  </div>

  <div id="result-screen">
    <div class="result-emoji" id="result-emoji">🏆</div>
    <h2>Výsledek kvízu</h2>
    <div class="score-pct" id="score-pct">0<span>%</span></div>
    <p class="score-msg" id="score-msg"></p>
    <div class="stats-grid">
      <div class="stat-card good"><div class="stat-val" id="rb-correct">0</div><div class="stat-label">Správně</div></div>
      <div class="stat-card bad"><div class="stat-val" id="rb-wrong">0</div><div class="stat-label">Špatně</div></div>
      <div class="stat-card"><div class="stat-val">20</div><div class="stat-label">Otázek</div></div>
    </div>
    <p class="variant-badge" id="variant-badge"></p>
    <div class="btn-row">
      <button class="new-btn" onclick="startQuiz()">🔀 Nová varianta</button>
      <button class="restart-btn" onclick="restartSame()">🔄 Opakovat stejnou</button>
    </div>
  </div>
</div>

<script>
const BANK = [
  // KATEGORIE VOZIDEL
  {q:"Do které kategorie patří motorová vozidla zpravidla s méně než čtyřmi koly?",a:["Kategorie L","Kategorie M","Kategorie N","Kategorie O"],c:0},
  {q:"Kategorie M zahrnuje motorová vozidla sloužící k:",a:["Dopravě nákladů","Dopravě osob","Zemědělské práci","Přívěsným účelům"],c:1},
  {q:"Kategorie N jsou motorová vozidla sloužící k:",a:["Dopravě osob","Terénní jízdě","Dopravě nákladů","Rekreaci"],c:2},
  {q:"Jak se označuje kategorie traktorů zemědělských nebo lesnických?",a:["Kategorie R","Kategorie S","Kategorie T","Kategorie O"],c:2},
  {q:"Kategorie O zahrnuje:",a:["Pracovní stroje","Přípojná vozidla","Traktory","Motorová vozidla s méně než 4 koly"],c:1},
  {q:"Kategorie S jsou:",a:["Sportovní vozidla","Pracovní stroje","Speciální traktory","Přívěsy"],c:1},
  // ZÁKLADNÍ POJMY
  {q:"Co je to 'nástavba' vozidla?",a:["Střecha karoserie","Funkční účelová část speciálního vozidla bez budky pro obsluhu","Zavazadlový prostor","Podvozek NA"],c:1},
  {q:"Co je 'pérování' vozidla?",a:["Systém řízení vozidla","Brzdová soustava","Zařízení k pružnému zachycování nárazů od nerovností vozovky","Pohonná soustava"],c:2},
  {q:"Co je 'řízení' vozidla?",a:["Soustava přenosu výkonu motoru","Brzdný systém","Ústrojí, kterým řidič udržuje nebo mění směr jízdy vozidla","Systém odpružení"],c:2},
  {q:"Co je 'brzdné zařízení'?",a:["Soustava pro přenos hnacího momentu","Soubor brzdových soustav a zpomalovacích soustav, jimiž je vozidlo opatřeno","Systém odpružení kol","Část podvozku"],c:1},
  {q:"Jaký je rozdíl mezi 'výstrojem' a 'výbavou' vozidla?",a:["Jsou to synonyma","Výstroj jsou předepsané prvky (zrcátka, stěrače), výbava jsou nespojené pomůcky (hasicí přístroj, nářadí)","Výstroj je nezbytný, výbava nikoliv","Výbava je spojena s vozidlem, výstroj nikoliv"],c:1},
  // ZÁKLADNÍ KONCEPCE
  {q:"Co rozumíme pojmem 'základní koncepce automobilu'?",a:["Typ karoserie","Umístění hnacího ústrojí (motoru, spojky, převodovky a rozvodovky) vůči nápravám","Barva a výbava vozu","Typ pohonu – benzín nebo diesel"],c:1},
  {q:"Jak je uspořádán motor v klasické koncepci?",a:["Motor vpředu, pohon předních kol","Motor vzadu, pohon zadních kol","Motor vpředu podélně, pohon zadních kol přes kloubový hřídel","Motor uprostřed, pohon všech kol"],c:2},
  {q:"Co je pohon Transaxle?",a:["Motor vzadu a pohon předních kol","Motor vpředu, převodovka s rozvodovkou na zadní poháněné nápravě","Motor uprostřed s pohonem všech kol","Motor příčně vzadu"],c:1},
  {q:"Jaká je nevýhoda klasické koncepce?",a:["Malý zavazadlový prostor","Nutnost spojovacího kloubového hřídele jako zdroje vibrací a hluku","Složitá zadní náprava","Přetáčivost vozidla"],c:1},
  {q:"Vozidlo s předním pohonem se chová jako:",a:["Přetáčivé","Nedotáčivé – tahané vpřed, stabilní stav","Labilní","Neutrálně stabilní"],c:1},
  {q:"Jak může být motor uspořádán u vozu s předním pohonem?",a:["Pouze příčně","Pouze podélně","Podélně (např. Audi) nebo příčně (např. Škoda Octavia)","Pouze vzadu"],c:2},
  {q:"Jaká je nevýhoda předního pohonu při jízdě do svahu a akceleraci?",a:["Sklon k přetáčivosti","Nestejné opotřebení pneumatik","Odlehčení přední hnací nápravy","Složité brzdění"],c:2},
  {q:"V roce 1980 představila firma Audi pohon všech kol pod názvem:",a:["Syncro","xDrive","Quattro","4Matic"],c:2},
  {q:"Co je nutné při pohonu všech kol pro vyrovnání otáček předních a zadních kol?",a:["Dvojitá spojka","Mezinápravový diferenciál","ABS systém","Aktivní odpružení"],c:1},
  {q:"Pohon všech kol se zpočátku používal především u:",a:["Sportovních vozů","Osobních automobilů vyšší třídy","Terénních vozidel","Nákladních vozidel"],c:2},
  {q:"Jaká je nevýhoda zadního pohonu s motorem vzadu?",a:["Žádný tunel v podlaze","Sklon k přetáčivosti a citlivost na boční vítr","Nedotáčivost","Hladká podlaha karoserie"],c:1},
  // ROZMÍSTĚNÍ NÁPRAV
  {q:"Číselný kód rozmístění náprav udává:",a:["Počet kol x počet hnacích kol","Počet náprav vpředu – počet náprav vzadu","Hmotnost přední a zadní nápravy","Rozvor a rozchod náprav"],c:1},
  {q:"Co znamená označení 4x4 u vozidla?",a:["Vozidlo má 4 nápravy","4 kola, všechna trvale poháněná","4 kola a 4 hnací hřídele","4 přední kola"],c:1},
  {q:"Vozidlo označené 6x4 má:",a:["6 kol, všechna poháněná","6 kol – trvale poháněné dvě zadní nápravy, bez pohonu přední nápravy","6 náprav a 4 hnací kola","6 kol a 4 nápravy"],c:1},
  // ROZMĚRY A HMOTNOSTI
  {q:"Co je 'rozvor náprav'?",a:["Vzdálenost středů otisků pneumatik obou kol nápravy","Vzdálenost kolmic ze středů kol na téže straně vozidla","Vzdálenost nejnižšího bodu podvozku od vozovky","Vzdálenost předního a zadního nárazníku"],c:1},
  {q:"Co je 'světlá výška'?",a:["Výška střechy vozidla","Vzdálenost nejnižšího bodu podvozku od vozovky","Výška od kola k podvozku","Výška okna vozidla"],c:1},
  {q:"Co je 'přechodový úhel'?",a:["Úhel rejdu předních kol","Úhel nájezdové rampy, přes kterou může vozidlo přejet aniž by uvázlo za spodek podvozku","Úhel svahu pro brzdění","Úhel natočení kol při zatáčení"],c:1},
  {q:"Jaká je největší povolená šířka vozidla kategorie M1?",a:["2,00 m","2,20 m","2,50 m","2,55 m"],c:2},
  {q:"Jaká je největší povolená výška vozidel obecně?",a:["3,50 m","4,00 m","4,20 m","3,80 m"],c:1},
  {q:"Co je 'provozní hmotnost' vozidla?",a:["Největší hmotnost povolená na pozemních komunikacích","Hmotnost nenaloženého vozidla s karoserií v pohotovostním stavu","Největší hmotnost daná konstrukcí","Hmotnost prázdného vozidla bez paliva"],c:1},
  {q:"Vozidlo v pohotovostním stavu má palivo naplněno na:",a:["100 %","75 %","90 %","50 %"],c:2},
  {q:"Jaká hmotnost řidiče se počítá při pohotovostním stavu vozidla?",a:["60 kg","70 kg","75 kg","80 kg"],c:2},
  // RÁMY
  {q:"Jakou funkci plní rám vozidla?",a:["Aerodynamický kryt motoru","Základní nosná část vozidla – přenáší síly a slouží k upevnění skupin vozidla","Část karoserie zajišťující tvar vozu","Ochrana posádky při nehodě"],c:1},
  {q:"Jak se dělí rámy podle torzní tuhosti?",a:["Svařované a nýtované","Torzně pružné a torzně tuhé","Žebřinové a páteřové","Celistvé a skládané"],c:1},
  {q:"Z čeho se skládá žebřinový rám?",a:["Ze středního podélného nosníku","Ze dvou podélníků a z několika příček","Z plošiny sloužící zároveň jako podlaha","Ze dvou podélníků sbližujících se uprostřed"],c:1},
  {q:"Jak je tvořen páteřový rám?",a:["Dvěma podélníky a příčkami","Středním podélným nosníkem, ke kterému se připevňuje pohonná soustava","Vyztužená plošina jako podlaha vozidla","Dvěma podélníky opisujícími obrys bočních stěn"],c:1},
  {q:"Co je vidlicový rám?",a:["Rám s příčkami ve tvaru V","Druh páteřového rámu, jehož střední nosník je vpředu i vzadu rozvidlen","Rám pro přívěsy a návěsy","Žebřinový rám se zesílenými příčkami"],c:1},
  {q:"Jaký profil průřezu mají podélníky žebřinového rámu?",a:["Profil L","Profil T","Profil U nebo tenkostěnný obdélníkový profil","Profil O (kruhový)"],c:2},
  // KAROSERIE
  {q:"Co je sedan?",a:["Dvouprostorová karoserie s dveřmi ukotveny ve střeše","Tříprostorová čtyřdveřová karoserie – zadní stěna zavazadlového prostoru svislá s výraznou hranou","Dvouprostorová pětidveřová karoserie s delší a plošší zádí","Otevřená dvoudveřová karoserie"],c:1},
  {q:"Co je hatchback?",a:["Tříprostorová čtyřdveřová karoserie","Dvouprostorová tří nebo pětidveřová karoserie – zavazadlový prostor přístupný dveřmi ukotveny ve střeše","Dvouprostorová pětidveřová karoserie s delší zádí","Otevřená sportovní karoserie"],c:1},
  {q:"Co je liftback?",a:["Tříprostorová čtyřdveřová karoserie","Dvouprostorová pětidveřová karoserie podobná hatchbacku, ale záď vozu je delší a plošší","Otevřená sportovní karoserie","Karoserie s výklopnou střechou"],c:1},
  // KOLA A DISKY
  {q:"Z čeho se skládá vozidlové kolo?",a:["Z pneumatiky a nápravy","Z diskového kola, ráfku a pneumatiky","Z ráfku, duše a ložiska","Z disku, kloubu a pneumatiky"],c:1},
  {q:"Proč musí mít kola co nejmenší hmotnost?",a:["Kvůli aerodynamice","Patří mezi neodpérované hmoty automobilu","Kvůli jednodušší výrobě","Kvůli nižší spotřebě paliva"],c:1},
  {q:"Jaký je rozdíl mezi lisovaným a odlévaným diskovým kolem?",a:["Lisované je z lehkých slitin, odlévané z oceli","Lisované je pro velkosériovou výrobu a levnější, odlévané je z lehkých slitin – lehčí a přesněji vyvážené","Lisované je pro sportovní vozy, odlévané pro NA","Neliší se, jsou synonyma"],c:1},
  {q:"K čemu slouží prohloubení ráfku?",a:["K odlehčení ráfku","Umožňuje montáž pneumatiky na nedělený ráfek","K uchycení brzdového třmenu","K uložení ventilku"],c:1},
  {q:"Co je zális (ET) disku kola?",a:["Průměr středového otvoru","Vzdálenost mezi pomyslným středem disku a místem dosednutí na nápravu vozidla","Počet otvorů pro šrouby","Šířka ráfku v palcích"],c:1},

const TOTAL_TIME = 60;
const Q_PER_ROUND = 20;
const CIRCUMFERENCE = 2 * Math.PI * 20;
const SHAPES = ['▲','■','●','✦'];

let sessionQ = [], current = 0, score = 0, wrong = 0, timeLeft = TOTAL_TIME;
let timerInterval = null, answered = false, variantNum = 0;

document.getElementById('bank-count').textContent = `Banka obsahuje ${BANK.length} otázek — pokaždé náhodně vybraných ${Q_PER_ROUND}`;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function startQuiz() {
  sessionQ = shuffle(BANK).slice(0, Q_PER_ROUND);
  variantNum++;
  current = 0; score = 0; wrong = 0;
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  showQuestion();
}

function restartSame() {
  current = 0; score = 0; wrong = 0;
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  answered = false; timeLeft = TOTAL_TIME;
  const q = sessionQ[current];
  document.getElementById('q-counter').textContent = `${current+1} / ${Q_PER_ROUND}`;
  document.getElementById('progress').style.width = `${(current/Q_PER_ROUND)*100}%`;
  const qCard = document.querySelector('.question-card');
  if (q.img) {
    qCard.innerHTML = `<div class="img-question">${q.img}<p class="q-label">${q.q}</p></div>`;
  } else {
    qCard.innerHTML = `<p class="question-text" id="q-text">${q.q}</p>`;
  }
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
  const ring = document.getElementById('timer-ring');
  const numEl = document.getElementById('timer-num');
  ring.style.stroke = '#fff'; ring.style.strokeDashoffset = 0; numEl.textContent = TOTAL_TIME;
  const answersEl = document.getElementById('answers');
  answersEl.innerHTML = '';
  const correctAnswer = q.a[q.c];
  shuffle([0,1,2,3]).forEach((origIdx, pos) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.setAttribute('data-idx', pos);
    btn.setAttribute('data-correct', q.a[origIdx] === correctAnswer ? '1' : '0');
    btn.innerHTML = `<span class="shape-icon">${SHAPES[pos]}</span><span>${q.a[origIdx]}</span>`;
    btn.onclick = () => selectAnswer(btn);
    answersEl.appendChild(btn);
  });
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    numEl.textContent = timeLeft;
    ring.style.strokeDashoffset = CIRCUMFERENCE*(1-timeLeft/TOTAL_TIME);
    if (timeLeft <= 10) ring.style.stroke = '#ff6b6b';
    if (timeLeft <= 0) { clearInterval(timerInterval); if (!answered) timeUp(); }
  }, 1000);
}

function selectAnswer(btn) {
  if (answered) return;
  answered = true; clearInterval(timerInterval);
  const btns = document.querySelectorAll('.answer-btn');
  btns.forEach(b => { b.disabled = true; b.classList.add('dim'); });
  const fb = document.getElementById('feedback');
  if (btn.getAttribute('data-correct') === '1') {
    score++;
    btn.classList.remove('dim'); btn.classList.add('correct');
    fb.className = 'feedback correct'; fb.textContent = '✓ Správně!';
  } else {
    wrong++;
    btn.classList.remove('dim'); btn.classList.add('wrong');
    btns.forEach(b => { if (b.getAttribute('data-correct')==='1') { b.classList.remove('dim'); b.classList.add('reveal'); }});
    fb.className = 'feedback wrong';
    fb.textContent = `✗ Špatně. Správná odpověď: ${sessionQ[current].a[sessionQ[current].c]}`;
  }
  fb.style.display = 'block';
  document.getElementById('next-btn').style.display = 'block';
}

function timeUp() {
  answered = true; wrong++;
  const btns = document.querySelectorAll('.answer-btn');
  btns.forEach(b => { b.disabled = true; b.classList.add('dim'); });
  btns.forEach(b => { if (b.getAttribute('data-correct')==='1') { b.classList.remove('dim'); b.classList.add('reveal'); }});
  const fb = document.getElementById('feedback');
  fb.className = 'feedback wrong';
  fb.textContent = `⏱ Čas vypršel! Správná odpověď: ${sessionQ[current].a[sessionQ[current].c]}`;
  fb.style.display = 'block';
  document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
  current++;
  if (current >= Q_PER_ROUND) showResults(); else showQuestion();
}

function showResults() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  const pct = Math.round((score/Q_PER_ROUND)*100);
  document.getElementById('score-pct').innerHTML = `${pct}<span>%</span>`;
  document.getElementById('rb-correct').textContent = score;
  document.getElementById('rb-wrong').textContent = wrong;
  document.getElementById('variant-badge').textContent = `Varianta #${variantNum} · ${Q_PER_ROUND} otázek z banku ${BANK.length}`;
  let emoji='😔', msg='Bude potřeba více procvičit. Projdi si slidy znovu.';
  if (pct>=90){emoji='🏆';msg='Výborně! Perfektní znalost učiva!';}
  else if (pct>=75){emoji='🎉';msg='Skvělé výsledky! Jen pár věcí k doladění.';}
  else if (pct>=55){emoji='👍';msg='Ujde to. Doporučujeme projít slidy znovu.';}
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('score-msg').textContent = msg;
  document.getElementById('progress').style.width = '100%';
}
</script>
